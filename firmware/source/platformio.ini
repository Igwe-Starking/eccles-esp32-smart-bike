; PlatformIO project configuration for Eccles Bike Control
; framework = espidf  — pure ESP-IDF build, no Arduino core
;
; Two environments:
;   esp32   — firmware build + flash (use this for normal development)
;   native  — host-side TTS packager build (run when wav files change)
;
; Normal workflow:
;   pio run -e esp32 -t upload        — build and flash firmware
;   pio run -e esp32 -t uploadfs      — build and flash LittleFS image
;   pio run -e native                 — rebuild TTS model if wavs changed
;
; First time setup:
;   pio run -e native                 — build and run packager (generates StaticModel.*)
;   pio run -e esp32 -t upload        — flash firmware
;   pio run -e esp32 -t uploadfs      — flash LittleFS partition

; ─── Common settings ────────────────────────────────────────────────────────
[common]
monitor_speed = 115200

[platformio]
src_dir = main

; ─── Native TTS packager environment ─────────────────────────────────────────
[env:native]
platform      = native
extra_scripts = post:execute-tts-packager.py

; only compile the host-side packager sources, not the ESP32 firmware
build_src_filter = -<*> +<../eccles/tools/src/>

build_flags =
    -std=c++17
    -O2

; no upload step for the native packager — execute-tts-packager.py handles everything
; including running the packager and flashing the LittleFS partition via idf.py


; ─── ESP32 firmware environment ─────────────────────────────────────────────
[env:esp32]
platform      = espressif32 @ 6.5.0
framework     = espidf
board         = esp32dev
monitor_speed = ${common.monitor_speed}

; PlatformIO espidf framework maps src_dir -> main/ component
; our main.cpp lives in main/ already — tell PlatformIO to use it directly

; custom partition table (nvs + factory app + littlefs)
board_build.partitions = partitions.csv

; LittleFS image from littlefs_image/ directory
board_build.filesystem      = littlefs
board_build.filesystem_size = 0x160000
board_upload.filesystem_image = littlefs_image/

; sdkconfig.defaults is picked up automatically by the espidf framework
; it enables CONFIG_PM_ENABLE, CONFIG_BT_AVRC_CT_ABS_VOL_ENABLE etc.

; IDF component manager: the main component lives in src/ (mapped to main/)
; additional components are in components/ — PlatformIO discovers them automatically

build_flags =
    -DECCLES_DEBUG
    -std=gnu++17
